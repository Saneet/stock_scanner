name: Stock Scanner Hourly

on:
  schedule:
    - cron: '0 16,18,20,22,0,2,4,6 * * 1-5'
  workflow_dispatch:
    inputs:
      dashboard_config_name:
        description: 'Choose which dashboard to run manually'
        required: true
        type: choice
        options:
          - STOCKS_AV
          - STOCKS_FMP

jobs:
  run-stock-scanner:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dashboard_config_name: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.dashboard_config_name)) || fromJSON('["STOCKS_AV", "STOCKS_FMP"]') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '26.4.0'

      - name: Install dependencies
        run: npm install

      - name: Run stock scanner
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          DASHBOARD_CONFIG_NAME: ${{ matrix.dashboard_config_name }}
        run: npm run fetch
