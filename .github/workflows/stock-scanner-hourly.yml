name: Stock Scanner Hourly

on:
  schedule:
    - cron: '0 8,10,12,14,16,18,20,22 * * *'
  workflow_dispatch:
    inputs:
      dashboard_config_name:
        description: 'Choose which dashboard to run manually'
        required: true
        type: choice
        options:
          - STOCKS_AV
          - STOCKS_FMP

jobs:
  run-stock-scanner-av:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        if: github.event_name == 'workflow_dispatch' && inputs.dashboard_config_name == 'STOCKS_AV'
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: github.event_name == 'workflow_dispatch' && inputs.dashboard_config_name == 'STOCKS_AV'
        uses: actions/setup-node@v5
        with:
          node-version: '26.4.0'

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' && inputs.dashboard_config_name == 'STOCKS_AV'
        run: npm install

      - name: Run stock scanner for STOCKS_AV
        if: github.event_name == 'workflow_dispatch' && inputs.dashboard_config_name == 'STOCKS_AV'
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          DASHBOARD_CONFIG_NAME: STOCKS_AV
        run: npm run fetch

      - name: Checkout repository
        if: github.event_name == 'schedule'
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: github.event_name == 'schedule'
        uses: actions/setup-node@v5
        with:
          node-version: '26.4.0'

      - name: Install dependencies
        if: github.event_name == 'schedule'
        run: npm install

      - name: Run stock scanner for STOCKS_AV
        if: github.event_name == 'schedule'
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          DASHBOARD_CONFIG_NAME: STOCKS_AV
        run: npm run fetch

  run-stock-scanner-fmp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        if: github.event_name == 'workflow_dispatch' && inputs.dashboard_config_name == 'STOCKS_FMP'
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: github.event_name == 'workflow_dispatch' && inputs.dashboard_config_name == 'STOCKS_FMP'
        uses: actions/setup-node@v5
        with:
          node-version: '26.4.0'

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' && inputs.dashboard_config_name == 'STOCKS_FMP'
        run: npm install

      - name: Run stock scanner for STOCKS_FMP
        if: github.event_name == 'workflow_dispatch' && inputs.dashboard_config_name == 'STOCKS_FMP'
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          DASHBOARD_CONFIG_NAME: STOCKS_FMP
        run: npm run fetch

      - name: Checkout repository
        if: github.event_name == 'schedule'
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: github.event_name == 'schedule'
        uses: actions/setup-node@v5
        with:
          node-version: '26.4.0'

      - name: Install dependencies
        if: github.event_name == 'schedule'
        run: npm install

      - name: Run stock scanner for STOCKS_FMP
        if: github.event_name == 'schedule'
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          DASHBOARD_CONFIG_NAME: STOCKS_FMP
        run: npm run fetch
